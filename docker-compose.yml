version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gametime-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root # Senha do root do MySQL
      MYSQL_DATABASE: games # Cria o banco 'games'
      USUARIO: user # Passa a variável de ambiente para o application.properties
      SENHA: password # Passa a variável de ambiente para o application.properties
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: . # Constrói a imagem a partir do Dockerfile na raiz
    container_name: gametime-backend
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      # Passa as mesmas credenciais para o Spring Boot
      USUARIO: user
      SENHA: password

volumes:
  db_data: