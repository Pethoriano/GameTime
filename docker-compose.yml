version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gametime-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: games
      USUARIO: user
      SENHA: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    # --- Adicionado Healthcheck ---
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: gametime-backend
    restart: unless-stopped
    # --- Modificado depends_on ---
    depends_on:
      db:
        condition: service_healthy # Espera o healthcheck do db passar
    ports:
      - "8080:8080"
    environment:
      USUARIO: user
      SENHA: password

volumes:
  db_data: